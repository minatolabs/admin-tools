services:
  ollama:
    image: ollama/ollama:latest
    container_name: assistai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  app:
    build: .
    container_name: assistai-app
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MODEL_NAME=llama3.1:8b
    restart: unless-stopped

volumes:
  ollama_data:
